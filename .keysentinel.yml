# KeySentinel Configuration
# Generated by keysentinel init

# Security Level: Strict
fail_on: low

# Post comment even when no secrets found
post_no_findings: true

# Maximum files to scan per PR
max_files: 100

# Enable/disable specific pattern groups
patterns:
  aws: true
  github: true
  slack: true
  stripe: true
  google: true
  generic: true
  keys: true
  database: true
  jwt: true
  npm: true
  discord: true
  heroku: true
  twilio: true
  sendgrid: true
  mailchimp: true

# Entropy detection (catches unknown secret formats)
entropy:
  enabled: true
  min_length: 20
  threshold: 4.2
  ignore_base64_like: true